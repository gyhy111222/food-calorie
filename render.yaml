services:
  - type: web
    name: food-calorie-analyzer
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: AI_API_KEY
        sync: false
      - key: AI_BASE_URL
        value: https://api.moonshot.cn/v1
      - key: AI_MODEL_NAME
        value: kimi-k2.5
      - key: PORT
        value: 10000
    healthCheckPath: /
